
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.tracker {
  padding: 1rem;
  background: #0a0e1a;
  border-radius: 16px;
  font-family: var(--font-sans);
  color: #e2e8f0;
  position: relative;
  overflow: hidden;
}
.stars-bg {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
}
.star { position: absolute; border-radius: 50%; background: #fff; }
.content { position: relative; z-index: 1; }
.week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.week-label { font-size: 15px; font-weight: 500; color: #e2e8f0; letter-spacing: 0.02em; }
.week-btn { background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #94a3b8; }
.week-btn:hover { background: rgba(255,255,255,0.12); color: #e2e8f0; }
.summary-row { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
.metric-card { background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; text-align: center; }
.metric-label { font-size: 11px; color: #64748b; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
.metric-val { font-size: 22px; font-weight: 500; color: #e2e8f0; }
.streak-row { display: flex; gap: 5px; margin-bottom: 1.25rem; align-items: center; flex-wrap: wrap; }
.streak-dot { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #475569; cursor: pointer; flex-shrink: 0; }
.streak-label { font-size: 12px; color: #64748b; margin-left: 4px; }
.day-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.day-tab { padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 0.5px solid rgba(255,255,255,0.12); color: #64748b; background: rgba(255,255,255,0.04); }
.day-tab:hover { background: rgba(255,255,255,0.08); color: #94a3b8; }
.day-tab.active { background: #1e3a5f; color: #93c5fd; border-color: #2563eb; }
.day-tab.mock-day { border-color: rgba(216,90,48,0.5); color: #fb923c; }
.day-tab.active.mock-day { background: #3b1a0a; color: #fb923c; border-color: #ea580c; }
.systems { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.25rem; }
.sys-card { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 1rem 1.25rem; }
.sys-card.mock-card { border-color: rgba(234,88,12,0.4); }
.sys-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sys-title { font-size: 13px; font-weight: 500; color: #cbd5e1; }
.sys-pct { font-size: 13px; font-weight: 500; }
.progress-bar-bg { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-bottom: 12px; }
.progress-bar-fill { height: 4px; border-radius: 2px; transition: width 0.35s; }
.tasks { display: flex; flex-direction: column; gap: 9px; }
.task-row { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 2px 0; }
.task-check { width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid rgba(255,255,255,0.2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.task-check.done { border-color: transparent; }
.task-check svg { display: none; }
.task-check.done svg { display: block; }
.task-text { font-size: 13px; color: #94a3b8; line-height: 1.4; }
.task-text.done { text-decoration: line-through; color: #475569; }
.task-optional { font-size: 10px; color: #475569; margin-left: 4px; }
.reflect-section { margin-top: 0.5rem; }
.section-label { font-size: 10px; font-weight: 500; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.reflect-area { width: 100%; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; font-size: 13px; color: #94a3b8; background: rgba(255,255,255,0.04); resize: none; font-family: var(--font-sans); min-height: 60px; }
.reflect-area::placeholder { color: #334155; }
.reflect-area:focus { outline: none; border-color: rgba(99,102,241,0.5); }
.save-btn { margin-top: 8px; padding: 7px 18px; border-radius: 8px; border: 0.5px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); font-size: 13px; cursor: pointer; color: #64748b; }
.save-btn:hover { background: rgba(255,255,255,0.09); color: #94a3b8; }
</style>

<div class="tracker">
<div class="stars-bg" id="starsBg"></div>
<div class="content">

<div class="week-nav">
  <button class="week-btn" onclick="changeWeek(-1)">← prev</button>
  <span class="week-label" id="weekLabel">Week 1</span>
  <button class="week-btn" onclick="changeWeek(1)">next →</button>
</div>

<div class="streak-row" id="streakRow"></div>

<div class="summary-row">
  <div class="metric-card">
    <div class="metric-label">Tasks done</div>
    <div class="metric-val" id="metTasksDone">0/0</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Day streak</div>
    <div class="metric-val" id="metStreak">0</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Overall</div>
    <div class="metric-val" id="metOverall">0%</div>
  </div>
</div>

<div class="day-tabs" id="dayTabs"></div>
<div class="systems" id="systemsContainer"></div>

<div class="reflect-section">
  <div class="section-label">Reflection for this day</div>
  <textarea class="reflect-area" id="reflectArea" placeholder="What went well? What was hard? Any mistakes to fix?"></textarea>
  <button class="save-btn" onclick="saveReflection()">Save note</button>
</div>

</div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MOCK_DAYS = [2, 5];

const SYSTEMS = [
  {
    id: 'core', label: 'System 1 — Core (Maths + Physics)', color: '#60a5fa',
    tasks: [
      { id: 'math_morning', label: 'Maths — 1.5 hr morning deep work' },
      { id: 'phys_morning', label: 'Physics — 1.5 hr morning deep work' },
      { id: 'phys_num', label: 'Physics numericals / derivations — 1 hr' },
      { id: 'math_prac', label: 'Maths practice — 45 min' },
    ]
  },
  {
    id: 'global', label: 'System 2 — Global (IELTS + German)', color: '#34d399',
    tasks: [
      { id: 'ielts_listen', label: 'IELTS Listening — 20 min' },
      { id: 'ielts_speak', label: 'IELTS Speaking — talk / record yourself' },
      { id: 'ielts_write', label: 'IELTS Writing — 1 paragraph' },
      { id: 'german', label: 'German — 30 min (10–15 words + 5 sentences)' },
    ]
  },
  {
    id: 'skill', label: 'System 4 — Skill Stack (Python + ML)', color: '#fb923c',
    tasks: [
      { id: 'python', label: 'Python practice — 30 min' },
      { id: 'ml_proj', label: 'Star Classifier / Binary Star project work' },
      { id: 'astro_code', label: 'Astronomy coding (plots, simulations)', optional: true },
    ]
  },
  {
    id: 'mind', label: 'System 3 — Mind (Psychology + Philosophy)', color: '#a78bfa',
    tasks: [
      { id: 'psych', label: 'Psychology / Philosophy — 30 min' },
      { id: 'astro_read', label: 'Astronomy reading / video — 20 min', optional: true },
    ]
  }
];

const MOCK_TASKS = [
  { id: 'mock_full', label: 'Full IELTS mock test (all 4 sections)' },
  { id: 'mock_analyze', label: 'Analyze mistakes — note weak areas' },
  { id: 'mock_reading', label: 'Extra Reading practice (your weakest skill)' },
];

const SUNDAY_TASKS = [
  { id: 'sun_revise', label: 'Revise whole week' },
  { id: 'sun_mixed', label: 'Solve mixed questions' },
  { id: 'sun_docu', label: 'Watch 1 astronomy documentary' },
  { id: 'sun_plan', label: 'Plan next week' },
  { id: 'sun_check', label: 'Monthly check — harder numericals? English improving? German progressing?' },
];

let state = {};
let currentWeek = 1;
let currentDay = 0;

function stateKey(w,d,id){ return 'w'+w+'_d'+d+'_'+id; }
function reflectKey(w,d){ return 'w'+w+'_d'+d+'_reflect'; }
function getChecked(w,d,id){ return state[stateKey(w,d,id)]||false; }
function setChecked(w,d,id,val){ state[stateKey(w,d,id)]=val; persist(); }
function getReflect(w,d){ return state[reflectKey(w,d)]||''; }
function setReflect(w,d,val){ state[reflectKey(w,d)]=val; persist(); }
function persist(){ try{ localStorage.setItem('abhi_cosmic',''+JSON.stringify(state)); }catch(e){} }
function load(){ try{ var s=localStorage.getItem('abhi_cosmic'); if(s) state=JSON.parse(s); }catch(e){} }

function getTasksForDay(day){
  if(day===6) return SUNDAY_TASKS;
  var base=SYSTEMS.flatMap(s=>s.tasks);
  if(MOCK_DAYS.includes(day)) return [...base,...MOCK_TASKS];
  return base;
}
function countDone(w,d){ return getTasksForDay(d).filter(t=>getChecked(w,d,t.id)).length; }
function totalTasks(w){
  var total=0,done=0;
  for(var d=0;d<7;d++){ var ts=getTasksForDay(d); total+=ts.length; done+=ts.filter(t=>getChecked(w,d,t.id)).length; }
  return {total,done};
}
function calcStreak(){
  var s=0;
  for(var d=currentDay;d>=0;d--){ if(countDone(currentWeek,d)>0) s++; else break; }
  return s;
}

function renderMetrics(){
  var {total,done}=totalTasks(currentWeek);
  document.getElementById('metTasksDone').textContent=done+'/'+total;
  document.getElementById('metStreak').textContent=calcStreak();
  document.getElementById('metOverall').textContent=total>0?Math.round(done/total*100)+'%':'0%';
  document.getElementById('weekLabel').textContent='Week '+currentWeek;
}

function renderStreak(){
  var streak=calcStreak();
  var row=document.getElementById('streakRow');
  var dots=DAYS.map(function(d,i){
    var done=countDone(currentWeek,i);
    var total=getTasksForDay(i).length;
    var full=done===total&&done>0;
    var partial=done>0&&!full;
    var isMock=MOCK_DAYS.includes(i);
    var bg='transparent',tc='#475569',bc='rgba(255,255,255,0.12)';
    if(full){ bg='#0f6e56'; bc='#1d9e75'; tc='#a7f3d0'; }
    else if(partial){ bg='rgba(255,255,255,0.07)'; tc='#94a3b8'; }
    else if(isMock){ bc='rgba(234,88,12,0.4)'; tc='#fb923c'; }
    var ring=i===currentDay?'box-shadow:0 0 0 2px #60a5fa;':'';
    return '<div class="streak-dot" style="background:'+bg+';border-color:'+bc+';color:'+tc+';'+ring+'" onclick="selectDay('+i+')">'+d[0]+'</div>';
  }).join('');
  row.innerHTML=dots+'<span class="streak-label">'+(streak>0?streak+'-day streak':'Start your streak!')+'</span>';
}

function renderDayTabs(){
  var el=document.getElementById('dayTabs');
  el.innerHTML=DAYS.map(function(d,i){
    var isMock=MOCK_DAYS.includes(i);
    var isActive=i===currentDay;
    var cls='day-tab'+(isActive?' active':'')+(isMock?' mock-day':'');
    return '<button class="'+cls+'" onclick="selectDay('+i+')">'+d+(isMock?' *':'')+'</button>';
  }).join('');
}

function taskHTML(t,checked,color){
  var opt=t.optional?'<span class="task-optional">optional</span>':'';
  return '<div class="task-row" data-task="'+t.id+'">'
    +'<div class="task-check'+(checked?' done':'')+'" style="'+(checked?'background:'+color+';':'')+'">'
    +'<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5.5 4,8 8.5,2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    +'</div>'
    +'<span class="task-text'+(checked?' done':'')+'">'+t.label+opt+'</span>'
    +'</div>';
}

function renderSystems(){
  var container=document.getElementById('systemsContainer');
  if(currentDay===6){
    var color='#fbbf24';
    var done=SUNDAY_TASKS.filter(t=>getChecked(currentWeek,6,t.id)).length;
    var pct=Math.round(done/SUNDAY_TASKS.length*100);
    container.innerHTML='<div class="sys-card"><div class="sys-header"><span class="sys-title">Sunday — Strategy Day</span><span class="sys-pct" style="color:'+color+'">'+pct+'%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%;background:'+color+';"></div></div><div class="tasks">'+SUNDAY_TASKS.map(t=>taskHTML(t,getChecked(currentWeek,6,t.id),color)).join('')+'</div></div>';
    attachListeners(SUNDAY_TASKS);
    return;
  }
  var isMock=MOCK_DAYS.includes(currentDay);
  var html=SYSTEMS.map(function(sys){
    var done=sys.tasks.filter(t=>getChecked(currentWeek,currentDay,t.id)).length;
    var pct=Math.round(done/sys.tasks.length*100);
    return '<div class="sys-card"><div class="sys-header"><span class="sys-title">'+sys.label+'</span><span class="sys-pct" style="color:'+sys.color+'">'+pct+'%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%;background:'+sys.color+';"></div></div><div class="tasks">'+sys.tasks.map(t=>taskHTML(t,getChecked(currentWeek,currentDay,t.id),sys.color)).join('')+'</div></div>';
  }).join('');
  if(isMock){
    var mc='#fb923c';
    var md=MOCK_TASKS.filter(t=>getChecked(currentWeek,currentDay,t.id)).length;
    var mp=Math.round(md/MOCK_TASKS.length*100);
    html+='<div class="sys-card mock-card"><div class="sys-header"><span class="sys-title">IELTS Mock Test Day</span><span class="sys-pct" style="color:'+mc+'">'+mp+'%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+mp+'%;background:'+mc+';"></div></div><div class="tasks">'+MOCK_TASKS.map(t=>taskHTML(t,getChecked(currentWeek,currentDay,t.id),mc)).join('')+'</div></div>';
  }
  container.innerHTML=html;
  var allTasks=isMock?[...SYSTEMS.flatMap(s=>s.tasks),...MOCK_TASKS]:SYSTEMS.flatMap(s=>s.tasks);
  attachListeners(allTasks);
}

function attachListeners(tasks){
  tasks.forEach(function(t){
    var row=document.querySelector('.task-row[data-task="'+t.id+'"]');
    if(!row) return;
    row.onclick=function(){ setChecked(currentWeek,currentDay,t.id,!getChecked(currentWeek,currentDay,t.id)); renderAll(); };
  });
}

function renderReflect(){
  document.getElementById('reflectArea').value=getReflect(currentWeek,currentDay);
}

function renderAll(){ renderMetrics(); renderStreak(); renderDayTabs(); renderSystems(); renderReflect(); }
function selectDay(d){ currentDay=d; renderAll(); }
function changeWeek(dir){ currentWeek=Math.max(1,currentWeek+dir); renderAll(); }
function saveReflection(){
  setReflect(currentWeek,currentDay,document.getElementById('reflectArea').value);
  var btn=document.querySelector('.save-btn');
  btn.textContent='Saved!'; setTimeout(function(){ btn.textContent='Save note'; },1500);
}

function makeStars(){
  var bg=document.getElementById('starsBg');
  var sizes=[[0.8,60],[1.2,30],[1.8,12]];
  var html='';
  sizes.forEach(function(pair){
    var size=pair[0], count=pair[1];
    for(var i=0;i<count;i++){
      var x=Math.random()*100, y=Math.random()*100;
      var op=(0.3+Math.random()*0.5).toFixed(2);
      html+='<div class="star" style="width:'+size+'px;height:'+size+'px;left:'+x+'%;top:'+y+'%;opacity:'+op+';"></div>';
    }
  });
  bg.innerHTML=html;
}

load();
makeStars();
var today=new Date().getDay();
currentDay=today===0?6:today-1;
renderAll();
</script>
